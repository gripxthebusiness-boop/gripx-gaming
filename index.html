<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="NeoSell - Your trusted electronics reseller. Shop a wide variety of high-quality electronics and gadgets.">
    <meta name="keywords" content="electronics, gadgets, reseller, online shopping, tech, devices">
    <meta name="author" content="NeoSell">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#dc2626">
    <meta name="msapplication-TileColor" content="#dc2626">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://neosell.store">
    <meta property="og:title" content="NeoSell - Electronics Reseller">
    <meta property="og:description" content="Shop high-quality electronics and gadgets from trusted brands. Wide variety of products at competitive prices.">
    <meta property="og:image" content="https://neosell.store/og-image.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="NeoSell - Electronics Reseller">
    <meta name="twitter:description" content="Shop high-quality electronics and gadgets. Wide variety of products at competitive prices.">
    <link rel="canonical" href="https://neosell.store">
    <!-- Performance optimizations -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://gripx-gaming.onrender.com">
    <link rel="preconnect" href="https://images.unsplash.com">
    <link rel="preconnect" href="https://res.cloudinary.com">
    <!-- Resource hints for faster prefetch -->
    <link rel="preload" as="script" href="/src/main.tsx">
    <link rel="prefetch" href="/src/app/pages/Products.tsx">
    <link rel="prefetch" href="/src/app/pages/ProductDetail.tsx">
    <title>NeoSell - Electronics Reseller</title>
    <style>
      /* Critical CSS for faster initial render */
      body {
        background-color: #fff;
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root {
        min-height: 100vh;
      }
      /* Prevent layout shift during font load */
      @font-face {
        font-family: 'system-ui';
        src: local('system-ui');
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Web performance monitoring (optional) -->
    <script>
      if (window.performance && window.performance.timing) {
        window.addEventListener('load', function() {
          setTimeout(function() {
            const perfData = window.performance.timing;
            const pageLoadTime = perfData.loadEventEnd - perfData.navigationStart;
            console.log('Page load time: ' + pageLoadTime + 'ms');
          }, 0);
        });
      }
    </script>
  </body>
</html>
